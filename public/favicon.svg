<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Cyclist silhouette -->
  <g fill="#1976d2">
    <!-- Head -->
    <circle cx="38" cy="14" r="5"/>

    <!-- Body -->
    <path d="M36 20 L28 36 L30 38 L38 28 L44 32 L46 30 Z"/>

    <!-- Legs -->
    <path d="M28 36 L26 42 L16 48"/>
    <path d="M28 36 L32 44 L38 50"/>

    <!-- Arms -->
    <path d="M36 20 L38 24 L44 24"/>

    <!-- Bike frame -->
    <line x1="30" y1="38" x2="16" y2="48" stroke="#333" stroke-width="2"/>
    <line x1="30" y1="38" x2="44" y2="48" stroke="#333" stroke-width="2"/>
    <line x1="16" y1="48" x2="44" y2="48" stroke="#333" stroke-width="2"/>
    <line x1="30" y1="38" x2="38" y2="28" stroke="#333" stroke-width="2"/>

    <!-- Front wheel -->
    <circle cx="16" cy="52" r="8" stroke="#333" stroke-width="2" fill="none"/>
    <circle cx="16" cy="52" r="1.5" fill="#333"/>

    <!-- Back wheel -->
    <circle cx="44" cy="52" r="8" stroke="#333" stroke-width="2" fill="none"/>
    <circle cx="44" cy="52" r="1.5" fill="#333"/>

    <!-- Pedals -->
    <line x1="28" y1="44" x2="32" y2="44" stroke="#333" stroke-width="1.5"/>
  </g>
</svg>
